name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@9e8a3f926a478b3c82b3ef70e2598e6350b76052 # use-mise-action-v1.1.2

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish
        run: pnpm publish --access public --provenance --no-git-checks
